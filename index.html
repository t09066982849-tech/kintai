<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>勤怠管理</h2>

<div id="login-box">
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
  <p id="login-error" style="color:red"></p>
</div>

<div id="main-box" style="display:none">
  <p id="welcome"></p>
  <select id="site-select"></select>
  <button id="action-btn"></button>
  <p id="status"></p>

  <h3>履歴</h3>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">← 前月</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">次月 →</button>
  </div>
  <table>
    <thead><tr><th>日付</th><th>現場</th><th>出勤</th><th>退勤</th><th>勤務時間</th><th>修正</th></tr></thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>打刻修正申請</h3>
    <p id="modal-date"></p>
    <label>出勤時刻</label>
    <input type="time" id="req-clock-in">
    <label>退勤時刻</label>
    <input type="time" id="req-clock-out">
    <button onclick="submitCorrection()">申請する</button>
    <button style="background:#9ca3af" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
